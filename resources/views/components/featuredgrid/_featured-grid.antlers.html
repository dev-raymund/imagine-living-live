<div class="featured-grid">
    {{ entries }}
        <div class="featured-grid-item {{ if entries | count %2 !== 0 }}grid-item-odd{{ /if }}" style="background-image: url( '{{ assets:images limit="1"}}{{ url }}{{ /assets:images }}' );
    background-size: cover;
    background-position: center;">
            <a href="/developments/#{{ title | camelize | lower }}">
                <div class="overlay-hover"></div>
                <div class="featured-grid-content relative z-10 p-6 md:px-10">
                    <h5 class="heading-5 font-bold">
                        {{ title }}
                    </h5>
                    <p class="p-small my-1">
                        {{ subtitle }}
                    </p>
                    <h6 class="heading-6 font-bold">
                        {{ price_range }}
                    </h6>
                </div>
            </a>
        </div>
    {{ /entries }}
</div>

<div class="showcase-card flex flex-col" data-id="{{ id }}">
    <div class="swiper-container showcase-card-slider mb-3" data-id="{{ id }}">
        <div class="swiper-wrapper">
            {{ images }}
                <div class="swiper-slide">
                    <a class="js-grid-gallery__content" data-id="{{ id }}" href={{ url }}>
                    <img src={{ url }} alt={{ title }} />
                    </a>
                </div>
            {{ /images }}
        </div>
    </div>
    <div class="swiper-container showcase-card-thumbs" data-id="{{ id }}">
        {{ if images | count > 1 }}
        <div class="swiper-wrapper">
            {{ images }}
                <div class="swiper-slide">
                    <img src={{ url }} alt={{ title }} />
                </div>
            {{ /images }}
        </div>
        {{ else }}
            <div class="swiper-wrapper" style="height: 224px;">
                <div class="swiper-slide empty-slide">
                </div>
            </div>
        {{ /if }}
    </div>
<div class="flex flex-col justify-between" style="flex-grow: 1;">
<a href="{{ link }}" 
    {{ if target_blank == '1' }}target="_blank" _open="noopener noreferrer"{{ /if }}>
    <div class="showcase-card__heading mt-8">
    <h4 class="heading-4 uppercase text-brand-secondary font-bold">
        {{ title }}
    </h4>
    <h6 class="heading-6 text-brand-primary uppercase font-bold">
        {{ subtitle }}
    </h6>
    <p class="p font-bold">
        {{ caption }}
    </p>
</div>
<h4 class="heading-4 uppercase text-brand-secondary font-bold my-4 md:my-8">
    {{ price_range }}
</h4>
<p class="p showcase-card__description js-showcase-card__description" data-id="{{ id }}">
    {{ description }}
</p>
<div class="p showcase-card__expand anchor anchor--primary js-showcase-card__expand" data-id="{{ id }}">
</div>
<div class="showcase-card__buttons">
    {{ buttons }}
        <a class="my-4 inline-flex w-full" href="{{ button_url }}">
            {{ partial:components/button/button  }}
        </a>
    {{ /buttons }}
</div></a>
</div>
</div>

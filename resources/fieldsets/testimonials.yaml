title: Testimonials
fields:
  -
    handle: heading
    field:
      input_type: text
      antlers: false
      display: 'Testimonials Title'
      type: text
      icon: text
      listable: hidden
      instructions_position: above
      width: 50
  -
    handle: background
    field:
      options:
        bg-brand-white: White
        bg-brand-gray: Gray
      multiple: false
      clearable: false
      searchable: true
      taggable: false
      push_tags: false
      cast_booleans: false
      default: White
      display: 'Testimonials Background'
      type: select
      icon: select
      width: 50
      listable: hidden
      instructions_position: above
  -
    handle: textarea
    field:
      antlers: false
      display: 'Testimonials Textarea'
      type: textarea
      icon: textarea
      listable: hidden
      instructions_position: above

title: Banner
fields:
  -
    handle: image
    field:
      mode: list
      restrict: false
      allow_uploads: true
      show_filename: true
      max_files: 1
      display: 'Banner Image'
      type: assets
      icon: assets
      listable: hidden
      instructions_position: above
  -
    handle: banner_title
    field:
      input_type: text
      antlers: false
      display: 'Banner Title'
      type: text
      icon: text
      listable: hidden
      instructions_position: above
